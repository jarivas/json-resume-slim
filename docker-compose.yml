services:
    dev:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - .:/app
        ports:
            - 8000:8000
        depends_on:
            mariadb:
                condition: service_healthy
        command: sh -c "while true; do sleep 3600; done"
        networks:
            - json-resume

    mariadb:
        image: mariadb:11.4
        environment:
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
            MARIADB_DATABASE: ${MARIADB_DATABASE}
        ports:
            - ${MARIADB_PORT}:3306
        healthcheck:
            test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 10s
        tmpfs:
            - /var/lib/mysql:rw,noexec,nosuid,size=256m
        networks:
            - json-resume
networks:
    json-resume:
        external: true